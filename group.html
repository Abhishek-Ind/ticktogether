<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Timers</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#5f47dd" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src 'self' https://ojuouvfractsloqozlyh.supabase.co wss://ojuouvfractsloqozlyh.supabase.co; style-src 'self'; img-src 'self' data:; worker-src 'self'">
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="stylesheet" href="group.css" />
  </head>
  <body>
    <header class="group-header">
      <div class="header-left">
        <a href="index.html" class="icon-btn nav-icon-btn" aria-label="Back to groups">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
            <line x1="20" y1="12" x2="9" y2="12"></line>
          </svg>
        </a>
        <div>
        <h1 id="group-name">Demo</h1>
        <p class="group-code-row">
          <span id="group-code">8AC03F</span>
          <button id="copy-code" class="icon-btn" type="button" aria-label="Copy group code">⧉</button>
        </p>
        </div>
      </div>
      <div class="header-actions">
        <p id="member-count">0 members</p>
        <button id="delete-group-top" class="icon-btn exit-icon-btn delete-icon-btn" type="button" aria-label="Delete group" hidden>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
          </svg>
        </button>
        <button id="leave-group-top" class="icon-btn exit-icon-btn" type="button" aria-label="Leave group">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <main class="group-page">
      <section>
        <h2>Group Timers</h2>
        <div class="scroll-box">
          <div id="active-alarms" class="card-stack"></div>
        </div>
      </section>

      <section>
        <h2>Members</h2>
        <div class="scroll-box">
          <div id="member-list" class="chips"></div>
        </div>
      </section>

      <section>
        <h2>History</h2>
        <div class="scroll-box">
          <div id="history-list" class="card-stack"></div>
        </div>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <button id="open-modal" class="fab" type="button" aria-label="Create alarm">+</button>

    <dialog id="timer-modal" class="modal">
      <form id="alarm-form" class="modal-content" method="dialog">
        <header class="modal-header">
          <h3>Set a Timer</h3>
          <button id="close-modal" type="button" class="icon-btn">✕</button>
        </header>

        <p>Choose duration, write an instruction, and select members.</p>

        <h4>Duration</h4>
        <div class="presets" id="preset-wrap">
          <button type="button" data-minutes="1">1 min</button>
          <button type="button" data-minutes="3">3 min</button>
          <button type="button" data-minutes="5" class="active">5 min</button>
          <button type="button" data-minutes="10">10 min</button>
          <button type="button" data-minutes="15">15 min</button>
        </div>

        <div class="custom-time">
          <input id="custom-min" type="number" min="0" max="99" value="5" />
          <span>min</span>
          <input id="custom-sec" type="number" min="0" max="59" value="0" />
          <span>sec</span>
        </div>

        <label for="alarm-message" class="label">Instruction</label>
        <textarea id="alarm-message" placeholder="Eg Turn Off The Stove" maxlength="120"></textarea>

        <div class="send-row">
          <strong>Send to</strong>
          <button id="select-all" type="button" class="text-btn">Select all</button>
        </div>
        <div id="recipient-list" class="recipient-list"></div>

        <button id="start-timer" class="start-btn" type="submit" disabled>Start Timer</button>
      </form>
    </dialog>

    <section id="alarm-popup" class="alarm-popup hidden" aria-live="assertive" role="alertdialog" aria-modal="true">
      <div class="alarm-popup-card">
        <h3>⏰ Alarm ringing</h3>
        <p id="alarm-popup-message">Timer is complete.</p>
        <div class="alarm-popup-actions">
          <button id="task-done" type="button" class="start-btn">Task done</button>
          <button id="mute-alarm" type="button" class="text-btn">Mute alarm</button>
        </div>
      </div>
    </section>

    <script src="config.js"></script>
    <script type="module" src="group.js"></script>
    <script src="register-sw.js" defer></script>
  </body>
</html>
